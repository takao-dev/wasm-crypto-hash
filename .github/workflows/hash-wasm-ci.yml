name: Hash WASM CI

on:
  workflow_dispatch: {}
  push:
    branches: [ master ]

jobs:
  build-and-sign:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Sign wasm metadata
        env:
          WASM_SIG_PRIV_PEM: ${{ secrets.WASM_SIG_PRIV_PEM }}
          WASM_SIG_ALGO: pss
        run: node ./scripts/sign_wasm.js

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hash-wasm-signed-metadata
          path: |
            wasm/*.wasm.json
            dist/**
          if-no-files-found: ignore
